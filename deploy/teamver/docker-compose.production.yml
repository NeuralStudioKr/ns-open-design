# Production override — teamver-design-api env_file (symlink .env 불필요).
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.production.yml --env-file .env.production ...

services:
  open-design-daemon:
    environment:
      OD_SCRATCH_EVICT_AFTER_RUN: "1"
      OD_S3_SYNC_UP_METRICS: "1"
      OD_SCRATCH_DISK_METRICS: "1"
      OD_SCRATCH_DISK_THRESHOLD_MB: ${OD_SCRATCH_DISK_THRESHOLD_MB:-2048}
      OD_SCRATCH_DISK_METRIC_INTERVAL_MS: ${OD_SCRATCH_DISK_METRIC_INTERVAL_MS:-300000}

  teamver-design-api:
    env_file:
      - .env.production
    environment:
      TEAMVER_DEPLOY_ENV: production
      AUTH_DISABLED: "false"
      ALLOW_NO_JWT_LOCAL_MODE: "false"
      OD_PROJECT_STORAGE: ${OD_PROJECT_STORAGE:?Set OD_PROJECT_STORAGE=s3 in .env.production}
