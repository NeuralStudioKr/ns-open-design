# Production override — teamver-design-api env_file (symlink .env 불필요).
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.production.yml --env-file .env.production ...

services:
  teamver-design-api:
    env_file:
      - .env.production
    environment:
      TEAMVER_DEPLOY_ENV: production
      AUTH_DISABLED: "false"
      ALLOW_NO_JWT_LOCAL_MODE: "false"
      OD_PROJECT_STORAGE: ${OD_PROJECT_STORAGE:?Set OD_PROJECT_STORAGE=s3 in .env.production}
