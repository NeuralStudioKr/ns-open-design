# Same-origin design-api BFF for OD embed SPA (/teamver-bff/* → design-api :16000/api/v1/*).
# Drive browse/search/thumbnails: /teamver-bff/drive/api/drive/* → /api/v1/drive/api/drive/*
# Include inside stg-design.teamver.com / design.teamver.com server blocks.
# BFF cold start: public exchange/config/session; protected routes use design-api session-probe.

location @teamver_od_bff_unauthorized {
    add_header Content-Type application/json always;
    return 401 '{"detail":"Unauthorized"}';
}

# BFF session probe for nginx auth_request (Apps JWT BFF — not Main cookie).
location = /_teamver_bff_session {
    internal;
    proxy_pass http://127.0.0.1:16000/api/v1/auth/session-probe;
    proxy_pass_request_body off;
    proxy_set_header Content-Length "";
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header Cookie $http_cookie;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;
}

location = /teamver-bff/auth/session {
    proxy_pass http://127.0.0.1:16000/api/v1/auth/session;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header Cookie $http_cookie;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;
    proxy_buffering off;
}

location = /teamver-bff/auth/refresh {
    proxy_pass http://127.0.0.1:16000/api/v1/auth/refresh;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header Cookie $http_cookie;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;
    proxy_buffering off;
}

location = /teamver-bff/design/auth/config {
    proxy_pass http://127.0.0.1:16000/api/v1/design/auth/config;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header Cookie $http_cookie;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;
    proxy_buffering off;
}

location = /teamver-bff/design/auth/exchange {
    proxy_pass http://127.0.0.1:16000/api/v1/design/auth/exchange;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header Cookie $http_cookie;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
