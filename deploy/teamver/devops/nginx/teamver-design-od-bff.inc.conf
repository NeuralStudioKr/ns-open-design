# Same-origin design-api BFF for OD embed SPA (/teamver-bff/* → design-api :16000/api/v1/*).
# Drive browse/search/thumbnails: /teamver-bff/drive/api/drive/* → /api/v1/drive/api/drive/*
# Include inside stg-design.teamver.com / design.teamver.com server blocks.
# BFF cold start: public exchange/config/session; protected routes use design-api session-probe.

location = /_teamver_bff_session {
    internal;
    proxy_pass http://127.0.0.1:16000/api/v1/auth/session-probe;
    proxy_pass_request_body off;
    proxy_set_header Content-Length "";
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header Cookie $http_cookie;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
    proxy_set_header X-Forwarded-Host $host;
}

location @teamver_od_bff_unauthorized {
    add_header Content-Type application/json always;
    add_header X-Teamver-Login-Url $teamver_bff_login_url always;
    # Mirror login_url into the JSON body so FE recovery can prompt re-login
    # without a second lookup. Header alone is fragile — same-origin fetch()
    # cannot expose custom response headers unless CORS lists them, and some
    # instrumentation strips response headers. Body payload is stable.
    return 401 '{"detail":"session_expired","login_url":"$teamver_bff_login_url"}';
}

location = /teamver-bff/auth/session {
    proxy_pass http://127.0.0.1:16000/api/v1/auth/session;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header Cookie $http_cookie;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
    proxy_set_header X-Forwarded-Host $host;
    proxy_buffering off;
}

# FE sticky-decline / re-login gates — read-only (no ensure/refresh), same as
# nginx auth_request probe. 204 = valid session; 401 = expired.
location = /teamver-bff/auth/session-probe {
    proxy_pass http://127.0.0.1:16000/api/v1/auth/session-probe;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
