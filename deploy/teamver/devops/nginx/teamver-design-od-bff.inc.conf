location = /teamver-bff/auth/workspace {
    proxy_pass http://127.0.0.1:16000/api/v1/auth/workspace;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header Cookie $http_cookie;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;
    proxy_buffering off;
}

location /teamver-bff/ {
    auth_request /_teamver_bff_session;
    error_page 401 403 = @teamver_od_bff_unauthorized;

    rewrite ^/teamver-bff/(.*)$ /api/v1/$1 break;
    proxy_pass http://127.0.0.1:16000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header Cookie $http_cookie;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Workspace-Id $teamver_daemon_workspace_id;
    proxy_buffering off;
}
