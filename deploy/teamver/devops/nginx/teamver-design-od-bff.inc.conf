# Same-origin design-api BFF for OD embed SPA (/teamver-bff/* → design-api :16000/api/v1/*).
# Include inside stg-design.teamver.com / design.teamver.com server blocks (after _teamver_auth).
# API fetch clients get 401 JSON — not @teamver_login 302 (which would loop with Main FE returnTo).

location @teamver_od_bff_unauthorized {
    add_header Content-Type application/json always;
    return 401 '{"detail":"Unauthorized"}';
}

location = /teamver-bff/auth/session {
    auth_request /_teamver_auth;
    auth_request_set $teamver_user_id $upstream_http_x_teamver_user_id;
    auth_request_set $teamver_workspace_id $upstream_http_x_teamver_workspace_id;
    error_page 401 403 = @teamver_od_bff_unauthorized;

    proxy_pass http://127.0.0.1:16000/api/v1/auth/session;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header Cookie $http_cookie;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Teamver-User-Id $teamver_user_id;
    proxy_set_header X-Teamver-Workspace-Id $teamver_workspace_id;
    proxy_buffering off;
}

location = /teamver-bff/auth/refresh {
    proxy_pass http://127.0.0.1:16000/api/v1/auth/refresh;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header Cookie $http_cookie;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;
    proxy_buffering off;
}

location /teamver-bff/ {
    auth_request /_teamver_auth;
    auth_request_set $teamver_user_id $upstream_http_x_teamver_user_id;
    auth_request_set $teamver_workspace_id $upstream_http_x_teamver_workspace_id;
    error_page 401 403 = @teamver_od_bff_unauthorized;

    rewrite ^/teamver-bff/(.*)$ /api/v1/$1 break;
    proxy_pass http://127.0.0.1:16000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header Cookie $http_cookie;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Teamver-User-Id $teamver_user_id;
    proxy_set_header X-Teamver-Workspace-Id $teamver_workspace_id;
    proxy_buffering off;
}
