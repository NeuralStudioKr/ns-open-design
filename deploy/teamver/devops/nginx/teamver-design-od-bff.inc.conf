# No auth_request on BFF proxies that may refresh Apps tokens.
# nginx auth_request subresponses do not forward Set-Cookie; a probe refresh
# rotated Main's one-time refresh_token while the browser kept the stale cookie
# → session_expired cascade (see docs-teamver/39_10). design-api handlers own
# auth via require_auth / ensure_bff_session / force_refresh.
location ^~ /teamver-bff/drive/ {
    rewrite ^/teamver-bff/drive/(.*)$ /api/v1/drive/$1 break;
    proxy_pass http://127.0.0.1:16000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header Cookie $http_cookie;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Workspace-Id $teamver_daemon_workspace_id;
    proxy_buffering off;
}

# Publish / import — same Set-Cookie ownership as Drive.
location ^~ /teamver-bff/projects {
    # List GET /teamver-bff/projects must land on /api/v1/projects (no trailing
    # slash). A single rewrite with `$1` empty produced `/api/v1/projects/`, and
    # FastAPI redirect_slashes 307'd the browser to OD-host `/api/v1/projects`
    # (no design-api proxy there) → registry list NotFoundError 404.
    rewrite ^/teamver-bff/projects/?$ /api/v1/projects break;
    rewrite ^/teamver-bff/projects/(.+)$ /api/v1/projects/$1 break;
    proxy_pass http://127.0.0.1:16000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header Cookie $http_cookie;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Workspace-Id $teamver_daemon_workspace_id;
    proxy_buffering off;
}

location ^~ /teamver-bff/canvas/ {
    rewrite ^/teamver-bff/canvas/(.*)$ /api/v1/canvas/$1 break;
    proxy_pass http://127.0.0.1:16000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header Cookie $http_cookie;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Workspace-Id $teamver_daemon_workspace_id;
    proxy_buffering off;
}

location /teamver-bff/ {
    # session-probe is read-only (no refresh). Near-expiry sessions pass through;
    # require_auth then calls ensure_bff_session so Set-Cookie can reach the browser.
    auth_request /_teamver_bff_session;
    auth_request_set $teamver_bff_login_url $upstream_http_x_teamver_login_url;
    error_page 401 403 = @teamver_od_bff_unauthorized;

    rewrite ^/teamver-bff/(.*)$ /api/v1/$1 break;
    proxy_pass http://127.0.0.1:16000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header Cookie $http_cookie;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Workspace-Id $teamver_daemon_workspace_id;
    proxy_buffering off;
}
