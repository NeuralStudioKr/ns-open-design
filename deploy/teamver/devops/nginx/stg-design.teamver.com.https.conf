# =============================================================================
# Teamver Design — Staging HTTPS
# - SAN: stg-design.teamver.com, stg-design-api.teamver.com
# - OD :7456, design-api :16000
#
# 적용:
#   sudo bash devops/nginx/apply_teamver_design_staging_nginx_conf.sh \
#     ./stg-design.teamver.com.https.conf \
#     --disable stg-design.teamver.com.http.conf
# =============================================================================

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

include /etc/nginx/conf.d/teamver-design-od-token.conf;
include /etc/nginx/sites-available/teamver-design-api-cors-map.inc.conf;

upstream teamver_main_be_stg {
    server stg-api.teamver.com:443;
    keepalive 4;
}

upstream open_design_daemon_stg {
    server 127.0.0.1:7456;
    keepalive 8;
}

server {
    listen 80;
    server_name stg-design.teamver.com;
    location ^~ /.well-known/acme-challenge/ {
        default_type "text/plain";
        root /var/www/certbot;
    }
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 80;
    server_name stg-design-api.teamver.com;
    location ^~ /.well-known/acme-challenge/ {
        default_type "text/plain";
        root /var/www/certbot;
    }
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name stg-design.teamver.com;

    ssl_certificate     /etc/letsencrypt/live/stg-design.teamver.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/stg-design.teamver.com/privkey.pem;

    client_max_body_size 200m;

    location = /_teamver_auth {
        internal;
        proxy_pass https://teamver_main_be_stg/api/auth/session-check;
        proxy_ssl_server_name on;
        proxy_set_header Host stg-api.teamver.com;
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";
        proxy_set_header Cookie $http_cookie;
        proxy_set_header Authorization $http_authorization;
        proxy_connect_timeout 3s;
        proxy_read_timeout 5s;
    }

    location @teamver_login {
        return 302 https://stg.teamver.com/auth/signin?returnTo=$scheme%3A%2F%2F$host$uri;
    }

    location = /_nginx/health {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }

    include /etc/nginx/sites-available/teamver-design-od-bff.inc.conf;

    location /api/ {
        auth_request /_teamver_auth;
        auth_request_set $teamver_user_id $upstream_http_x_teamver_user_id;
        auth_request_set $teamver_workspace_id $upstream_http_x_teamver_workspace_id;
        error_page 401 403 = @teamver_login;

        proxy_pass http://open_design_daemon_stg;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Teamver-User-Id $teamver_user_id;
        proxy_set_header X-Teamver-Workspace-Id $teamver_workspace_id;
        proxy_set_header Authorization "Bearer $teamver_od_api_token";
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_cache off;
        gzip off;
        proxy_connect_timeout 10s;
        proxy_send_timeout 3600s;
        proxy_read_timeout 3600s;
    }

    location / {
        auth_request /_teamver_auth;
        error_page 401 403 = @teamver_login;

        proxy_pass http://open_design_daemon_stg;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_buffering off;
        proxy_connect_timeout 10s;
        proxy_send_timeout 900s;
        proxy_read_timeout 900s;
    }

    access_log /var/log/nginx/stg-design.teamver.access.log;
    error_log  /var/log/nginx/stg-design.teamver.error.log;
}

server {
    listen 443 ssl http2;
    server_name stg-design-api.teamver.com;

    ssl_certificate     /etc/letsencrypt/live/stg-design.teamver.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/stg-design.teamver.com/privkey.pem;

    client_max_body_size 200m;

    location = /_teamver_auth {
        internal;
        proxy_pass https://teamver_main_be_stg/api/auth/session-check;
        proxy_ssl_server_name on;
        proxy_set_header Host stg-api.teamver.com;
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";
        proxy_set_header Cookie $http_cookie;
        proxy_set_header Authorization $http_authorization;
        proxy_connect_timeout 3s;
        proxy_read_timeout 5s;
    }

    include /etc/nginx/sites-available/teamver-design-api-gate.inc.conf;
    include /etc/nginx/sites-available/teamver-design-api-protected-routes.inc.conf;

    location = /_nginx/health {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }

    location = /api/healthz {
        proxy_pass http://127.0.0.1:16000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    location = /api/healthz/deps {
        proxy_pass http://127.0.0.1:16000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    location = /api/v1/auth/session {
        proxy_pass http://127.0.0.1:16000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Cookie $http_cookie;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    location = /api/v1/auth/refresh {
        proxy_pass http://127.0.0.1:16000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Cookie $http_cookie;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    # M2M usage ingest — daemon/localhost only; public internet blocked (10 §3.3)
    location /api/internal/ {
        allow 127.0.0.1;
        allow ::1;
        deny all;
        proxy_pass http://127.0.0.1:16000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_buffering off;
    }

    location /api/token-usage {
        # M2M — design-api validates X-Teamver-Internal-Api-Key (no session cookie)
        proxy_pass http://127.0.0.1:16000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_buffering off;
    }

    location / {
        return 404;
    }

    access_log /var/log/nginx/stg-design-api.teamver.access.log;
    error_log  /var/log/nginx/stg-design-api.teamver.error.log;
}
