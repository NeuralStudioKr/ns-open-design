# Cookie SSO — no auth_request (session probe returns 200 + authenticated:false).
# CORS for credentialed fetch from stg-design / design embed origins.

location = /api/v1/auth/session {
    if ($request_method = OPTIONS) {
        add_header Access-Control-Allow-Origin $teamver_design_cors_origin always;
        add_header Access-Control-Allow-Credentials "true" always;
        add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
        add_header Access-Control-Allow-Headers $http_access_control_request_headers always;
        add_header Access-Control-Max-Age 86400 always;
        return 204;
    }

    add_header Access-Control-Allow-Origin $teamver_design_cors_origin always;
    add_header Access-Control-Allow-Credentials "true" always;

    proxy_pass http://127.0.0.1:16000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header Cookie $http_cookie;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;
    proxy_buffering off;
}

location = /api/v1/auth/refresh {
    if ($request_method = OPTIONS) {
        add_header Access-Control-Allow-Origin $teamver_design_cors_origin always;
        add_header Access-Control-Allow-Credentials "true" always;
        add_header Access-Control-Allow-Methods "POST, OPTIONS" always;
        add_header Access-Control-Allow-Headers $http_access_control_request_headers always;
        add_header Access-Control-Max-Age 86400 always;
        return 204;
    }

    add_header Access-Control-Allow-Origin $teamver_design_cors_origin always;
    add_header Access-Control-Allow-Credentials "true" always;

    proxy_pass http://127.0.0.1:16000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header Cookie $http_cookie;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;
    proxy_buffering off;
}
