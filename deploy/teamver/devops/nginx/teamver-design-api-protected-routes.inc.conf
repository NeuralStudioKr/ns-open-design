# Cookie-auth design-api BFF routes (usage, projects, bootstrap, runtime-config).
# Include inside design-api `server { }` after teamver-design-api-gate.inc.conf.
#
# OPTIONS: return 418 + error_page does NOT work when return is inside `if`
# (nginx 1.18) — browsers see raw 418 with no CORS headers. Inline 204 instead.

location ~ ^/api/v1/(usage/|projects|bootstrap|runtime-config|permissions) {
    if ($request_method = OPTIONS) {
        add_header Access-Control-Allow-Origin $teamver_design_cors_origin always;
        add_header Access-Control-Allow-Credentials "true" always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers $http_access_control_request_headers always;
        add_header Access-Control-Max-Age 86400 always;
        return 204;
    }

    auth_request /_teamver_auth;
    auth_request_set $teamver_user_id $upstream_http_x_teamver_user_id;
    auth_request_set $teamver_workspace_id $upstream_http_x_teamver_workspace_id;
    error_page 401 403 = @teamver_api_unauthorized;

    proxy_pass http://127.0.0.1:16000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header Cookie $http_cookie;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Teamver-User-Id $teamver_user_id;
    proxy_set_header X-Teamver-Workspace-Id $teamver_daemon_workspace_id;
    proxy_set_header X-Workspace-Id $teamver_daemon_workspace_id;
    proxy_buffering off;
}
