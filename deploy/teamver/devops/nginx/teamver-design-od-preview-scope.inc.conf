# Project preview scope assets (/api/projects/:id/preview/:scope/*).
# Sandbox iframe subresources cannot send session cookies — auth_request would
# 302 to Main FE signin (cross-origin blocked in iframe). Daemon validates the
# minted scope server-side; nginx forwards with OD bearer only.
# Parent mints scope via GET /api/projects/:id/preview-url (session-gated).

location ~ ^/api/projects/[^/]+/preview/ {
    limit_except GET HEAD {
        deny all;
    }

    proxy_pass http://open_design_daemon_hashed;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header Authorization "Bearer $teamver_od_api_token";
    proxy_set_header Connection "";
    proxy_buffering off;
    add_header Cache-Control "no-store" always;
}
