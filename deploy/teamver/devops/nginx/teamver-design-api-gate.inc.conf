# design-api server block helpers — include inside `server { ... }` for design-api.* hosts.
# Requires http-level map (see teamver-design-api-cors-map.inc.conf).

error_page 418 = @teamver_design_api_cors_preflight;

location @teamver_design_api_cors_preflight {
    # Browsers do not send cookies on CORS preflight; must bypass auth_request.
    add_header Access-Control-Allow-Origin $teamver_design_cors_origin always;
    add_header Access-Control-Allow-Credentials "true" always;
    add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
    add_header Access-Control-Allow-Headers $http_access_control_request_headers always;
    add_header Access-Control-Max-Age 86400 always;
    add_header Content-Length 0;
    return 204 "";
}

location @teamver_api_unauthorized {
    # API hosts must not 302 to login — fetch/CORS cannot follow redirects.
    add_header Access-Control-Allow-Origin $teamver_design_cors_origin always;
    add_header Access-Control-Allow-Credentials "true" always;
    add_header Content-Type application/json always;
    return 401 '{"detail":"Unauthorized"}';
}
