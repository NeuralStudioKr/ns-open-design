# Plugin / design-template preview — sandbox subresource + CSP (Teamver embed).
# SSOT: docs-teamver/25_플러그인_preview_샌드박스_nginx_보강.md
# Include inside design.teamver.com / stg-design.teamver.com server blocks BEFORE location /api/.
#
# Prefix /api/plugins/ is longer than /api/, so plugin traffic never falls through
# to the session-gated /api/ block when this include is deployed.
#
# Parent blocks intentionally omit auth_request — nested locations own auth so
# bundled /asset/ subresources stay public (sandbox iframe omits session cookies).

# --- Plugins -----------------------------------------------------------------
location /api/plugins/ {
    # Bundled JS/CSS/images — no session gate (GET/HEAD only).
    location ~ /asset/ {
        limit_except GET HEAD {
            deny all;
        }

        proxy_pass http://open_design_daemon_local;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization "Bearer $teamver_od_api_token";
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_cache off;
        gzip off;
        proxy_connect_timeout 10s;
        proxy_send_timeout 3600s;
        proxy_read_timeout 3600s;

        proxy_hide_header Content-Security-Policy;
        add_header Content-Security-Policy "default-src 'none'; img-src 'self' data: blob:; media-src 'self' data: blob:; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; script-src 'self' 'unsafe-inline'; connect-src 'none'; frame-ancestors 'self'" always;
    }

    # Preview / example HTML — session required; CSP relaxed for Google Fonts.
    location ~ /(preview|example)/ {
        auth_request /_teamver_bff_session;
        auth_request_set $teamver_user_id $upstream_http_x_teamver_user_id;
        auth_request_set $teamver_workspace_id $upstream_http_x_teamver_workspace_id;
        error_page 401 403 = @teamver_login;

        proxy_pass http://open_design_daemon_hashed;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Teamver-User-Id $teamver_user_id;
        proxy_set_header X-Teamver-Workspace-Id $teamver_daemon_workspace_id;
        proxy_set_header X-Workspace-Id $teamver_daemon_workspace_id;
        proxy_set_header Authorization "Bearer $teamver_od_api_token";
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_cache off;
        gzip off;
        proxy_connect_timeout 10s;
        proxy_send_timeout 3600s;
        proxy_read_timeout 3600s;

        proxy_hide_header Content-Security-Policy;
        add_header Content-Security-Policy "default-src 'none'; img-src 'self' data: blob:; media-src 'self' data: blob:; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; script-src 'self' 'unsafe-inline'; connect-src 'none'; frame-ancestors 'self'" always;
    }

    # apply, events, plugin metadata, … — session required (catch-all).
    location ~ ^/api/plugins/ {
        auth_request /_teamver_bff_session;
        auth_request_set $teamver_user_id $upstream_http_x_teamver_user_id;
        auth_request_set $teamver_workspace_id $upstream_http_x_teamver_workspace_id;
        error_page 401 403 = @teamver_login;

        proxy_pass http://open_design_daemon_hashed;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Teamver-User-Id $teamver_user_id;
        proxy_set_header X-Teamver-Workspace-Id $teamver_daemon_workspace_id;
        proxy_set_header X-Workspace-Id $teamver_daemon_workspace_id;
        proxy_set_header Authorization "Bearer $teamver_od_api_token";
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_cache off;
        gzip off;
        proxy_connect_timeout 10s;
        proxy_send_timeout 3600s;
        proxy_read_timeout 3600s;
    }
}

