# Plugin / design-template preview — sandbox subresource + CSP (Teamver embed).
# SSOT: docs-teamver/25_플러그인_preview_샌드박스_nginx_보강.md
# Include inside design.teamver.com / stg-design.teamver.com server blocks BEFORE location /api/.
#
# OD preview iframes use sandbox="allow-scripts" without allow-same-origin, so
# <script src="/api/plugins/.../asset/*"> does not send session cookies.
# Default auth_request + @teamver_login 302 breaks deck-stage.js loads.
# Read-only bundled plugin/skill assets skip the session gate (GET/HEAD only).
# OD §9.2 CSP blocks Google Fonts; nginx replaces CSP on plugin preview surfaces.

# --- Plugin bundled assets (deck-stage.js, CSS, images) ---------------------
location ~ ^/api/plugins/[^/]+/asset/ {
    limit_except GET HEAD {
        deny all;
    }

    proxy_pass http://127.0.0.1:7456;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Authorization "Bearer $teamver_od_api_token";
    proxy_set_header Connection "";
    proxy_buffering off;
    proxy_cache off;
    gzip off;
    proxy_connect_timeout 10s;
    proxy_send_timeout 3600s;
    proxy_read_timeout 3600s;

    proxy_hide_header Content-Security-Policy;
    add_header Content-Security-Policy "default-src 'none'; img-src 'self' data: blob:; media-src 'self' data: blob:; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; script-src 'self' 'unsafe-inline'; connect-src 'none'; frame-ancestors 'self'" always;
}

# --- Plugin preview / example HTML (session required; CSP relaxed for fonts) --
location ~ ^/api/plugins/[^/]+/(preview|example/) {
    auth_request /_teamver_auth;
    auth_request_set $teamver_user_id $upstream_http_x_teamver_user_id;
    auth_request_set $teamver_workspace_id $upstream_http_x_teamver_workspace_id;
    error_page 401 403 = @teamver_login;

    proxy_pass http://127.0.0.1:7456;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Teamver-User-Id $teamver_user_id;
    proxy_set_header X-Teamver-Workspace-Id $teamver_daemon_workspace_id;
    proxy_set_header X-Workspace-Id $teamver_daemon_workspace_id;
    proxy_set_header Authorization "Bearer $teamver_od_api_token";
    proxy_set_header Connection "";
    proxy_buffering off;
    proxy_cache off;
    gzip off;
    proxy_connect_timeout 10s;
    proxy_send_timeout 3600s;
    proxy_read_timeout 3600s;

    proxy_hide_header Content-Security-Policy;
    add_header Content-Security-Policy "default-src 'none'; img-src 'self' data: blob:; media-src 'self' data: blob:; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; script-src 'self' 'unsafe-inline'; connect-src 'none'; frame-ancestors 'self'" always;
}

# --- Design-template skill assets (same sandbox subresource cookie gap) -------
location ~ ^/api/skills/[^/]+/assets/ {
    limit_except GET HEAD {
        deny all;
    }

    proxy_pass http://127.0.0.1:7456;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Authorization "Bearer $teamver_od_api_token";
    proxy_set_header Connection "";
    proxy_buffering off;
    proxy_cache off;
    gzip off;
    proxy_connect_timeout 10s;
    proxy_send_timeout 3600s;
    proxy_read_timeout 3600s;
}
