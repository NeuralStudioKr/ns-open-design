# Allowed Origin for design-api CORS preflight / 401 responses (http context).
map $http_origin $teamver_design_cors_origin {
    default "";
    "~^https://([a-zA-Z0-9-]+\.)*teamver\.com$" $http_origin;
    "http://localhost:3000"  $http_origin;
    "http://127.0.0.1:3000" $http_origin;
    "http://localhost:5173"  $http_origin;
    "http://127.0.0.1:5173" $http_origin;
}
