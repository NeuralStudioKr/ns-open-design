# =============================================================================
# Teamver Design (Open Design) — Production HTTPS (VM 직접 TLS 종료 시만)
#
# ⚠️ 프로덕션 기본 경로는 AWS ALB + design.teamver.com.http.conf 입니다.
#    LB가 TLS 종료하는데 이 파일을 enable 하면 ERR_TOO_MANY_REDIRECTS 가 납니다.
#
# - design.teamver.com → 127.0.0.1:7456
# - auth_request → design-api BFF session-probe (/_teamver_bff_session)
# =============================================================================

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# Embed FE active workspace (X-Workspace-Id) overrides BFF session-probe workspace for daemon/BFF.
map $http_x_workspace_id $teamver_daemon_workspace_id {
    ""      $teamver_workspace_id;
    default $http_x_workspace_id;
}

include /etc/nginx/conf.d/teamver-design-od-token.conf;

upstream teamver_main_be_prod {
    server 127.0.0.1:8891;
    keepalive 8;
}

include /etc/nginx/sites-available/teamver-design-od-daemon-upstream.inc.conf;

server {
    listen 80;
    server_name design.teamver.com;
    location ^~ /.well-known/acme-challenge/ {
        default_type "text/plain";
        root /var/www/certbot;
    }
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name design.teamver.com;

    ssl_certificate     /etc/letsencrypt/live/design.teamver.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/design.teamver.com/privkey.pem;

    client_max_body_size 200m;

    # Legacy Main session-check stub removed (2026-07 §16).
    # Daemon/API auth_request uses /_teamver_bff_session → design-api session-probe.
    # Do not reintroduce /_teamver_auth — it is unused and races BFF cookie ownership.

    # Legacy named location — plugins/skills now use @teamver_od_bff_unauthorized.
    # Keep returnTo on Design SPA root (never $uri) so any leftover 401 hop
    # cannot restore onto /api/plugins/... after Main sign-in.
    location @teamver_login {
        return 302 https://teamver.com/auth/signin?app_id=teamver-design&redirect_url=https%3A%2F%2Fdesign.teamver.com%2Fauth%2Fcallback&returnTo=https%3A%2F%2Fdesign.teamver.com%2F;
    }

    location = /_nginx/health {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }

    include /etc/nginx/sites-available/teamver-design-od-bff.inc.conf;
    include /etc/nginx/sites-available/teamver-design-plugin-preview.inc.conf;
    include /etc/nginx/sites-available/teamver-design-od-public-static.inc.conf;
    include /etc/nginx/sites-available/teamver-design-od-preview-scope.inc.conf;

    # Defense-in-depth: even on the optional direct-TLS path, M2M endpoints
    # must never be exposed publicly. /api/internal/* hits design-api on
    # :16000 from loopback only (matches design-api.teamver.com http.conf).
    location /api/internal/ {
        allow 127.0.0.1;
        allow ::1;
        deny all;
        proxy_pass http://127.0.0.1:16000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host;
        proxy_buffering off;
    }

    location /api/ {
        auth_request /_teamver_bff_session;
        auth_request_set $teamver_user_id $upstream_http_x_teamver_user_id;
        auth_request_set $teamver_workspace_id $upstream_http_x_teamver_workspace_id;
        error_page 401 403 = @teamver_od_bff_unauthorized;

        proxy_pass http://open_design_daemon_hashed;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Teamver-User-Id $teamver_user_id;
        proxy_set_header X-Teamver-Workspace-Id $teamver_daemon_workspace_id;
        proxy_set_header X-Workspace-Id $teamver_daemon_workspace_id;
        proxy_set_header Authorization "Bearer $teamver_od_api_token";
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_cache off;
        gzip off;
        proxy_connect_timeout 10s;
        proxy_send_timeout 3600s;
        proxy_read_timeout 3600s;
    }

    location / {
        proxy_pass http://open_design_daemon_local;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_buffering off;
        proxy_connect_timeout 10s;
        proxy_send_timeout 900s;
        proxy_read_timeout 900s;
    }

    access_log /var/log/nginx/design.teamver.access.log;
    error_log  /var/log/nginx/design.teamver.error.log;
}
