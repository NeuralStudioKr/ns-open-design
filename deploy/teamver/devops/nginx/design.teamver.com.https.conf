# =============================================================================
# Teamver Design (Open Design) — Production HTTPS (VM 직접 TLS 종료 시만)
#
# ⚠️ 프로덕션 기본 경로는 AWS ALB + design.teamver.com.http.conf 입니다.
#    LB가 TLS 종료하는데 이 파일을 enable 하면 ERR_TOO_MANY_REDIRECTS 가 납니다.
#
# - design.teamver.com → 127.0.0.1:7456
# - auth_request → Main BE /api/auth/session-check
# =============================================================================

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

include /etc/nginx/conf.d/teamver-design-od-token.conf;

upstream teamver_main_be_prod {
    server 127.0.0.1:8891;
    keepalive 8;
}

upstream open_design_daemon {
    server 127.0.0.1:7456;
    keepalive 8;
}

server {
    listen 80;
    server_name design.teamver.com;
    location ^~ /.well-known/acme-challenge/ {
        default_type "text/plain";
        root /var/www/certbot;
    }
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name design.teamver.com;

    ssl_certificate     /etc/letsencrypt/live/design.teamver.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/design.teamver.com/privkey.pem;

    client_max_body_size 200m;

    location = /_teamver_auth {
        internal;
        proxy_pass http://teamver_main_be_prod/api/auth/session-check;
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";
        proxy_set_header Cookie $http_cookie;
        proxy_set_header Authorization $http_authorization;
        proxy_connect_timeout 3s;
        proxy_read_timeout 5s;
    }

    location @teamver_login {
        return 302 https://teamver.com/auth/signin?returnTo=$scheme%3A%2F%2F$host$uri;
    }

    location = /_nginx/health {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }

    # Defense-in-depth: even on the optional direct-TLS path, M2M endpoints
    # must never be exposed publicly. /api/internal/* hits design-api on
    # :16000 from loopback only (matches design-api.teamver.com http.conf).
    location /api/internal/ {
        allow 127.0.0.1;
        allow ::1;
        deny all;
        proxy_pass http://127.0.0.1:16000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host;
        proxy_buffering off;
    }

    location /api/ {
        auth_request /_teamver_auth;
        auth_request_set $teamver_user_id $upstream_http_x_teamver_user_id;
        auth_request_set $teamver_workspace_id $upstream_http_x_teamver_workspace_id;
        error_page 401 403 = @teamver_login;

        proxy_pass http://open_design_daemon;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Teamver-User-Id $teamver_user_id;
        proxy_set_header X-Teamver-Workspace-Id $teamver_workspace_id;
        proxy_set_header Authorization "Bearer $teamver_od_api_token";
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_cache off;
        gzip off;
        proxy_connect_timeout 10s;
        proxy_send_timeout 3600s;
        proxy_read_timeout 3600s;
    }

    location / {
        auth_request /_teamver_auth;
        error_page 401 403 = @teamver_login;

        proxy_pass http://open_design_daemon;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_buffering off;
        proxy_connect_timeout 10s;
        proxy_send_timeout 900s;
        proxy_read_timeout 900s;
    }

    access_log /var/log/nginx/design.teamver.access.log;
    error_log  /var/log/nginx/design.teamver.error.log;
}
