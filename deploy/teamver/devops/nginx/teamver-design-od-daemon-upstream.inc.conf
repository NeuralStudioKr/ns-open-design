# OD daemon upstream — Phase 4 userId hash routing (docs-teamver/39_2 §4).
#
# ALB는 round-robin (stickiness OFF 권장). affinity는 nginx가 담당:
#   hash $teamver_daemon_hash_key consistent → 127.0.0.1 + peer EC2 :7456
#
# Hash key 우선순위:
#   1) $teamver_user_id  — auth_request / session-probe 이후 (동일 user → 동일 노드, 다기기 포함)
#   2) projectId in URI — /api/projects/:id/preview/… (iframe, session cookie 없음)
#   3) $binary_remote_addr — 그 외 (public static asset 등; 노드 간 동일 빌드)
#
# Peer server lines: /etc/nginx/conf.d/teamver-design-od-daemon-peers.inc.conf
# (render_od_daemon_peers_nginx.sh 가 EC2 private IP 로 생성)

map $uri $teamver_daemon_hash_key_from_uri {
    default "";
    ~^/api/projects/([^/]+)/preview/ $1;
}

map $teamver_user_id $teamver_daemon_hash_key {
    default $teamver_user_id;
    ""      $teamver_daemon_hash_key_from_uri;
}

map $teamver_daemon_hash_key $teamver_daemon_hash_key_resolved {
    default $teamver_daemon_hash_key;
    ""      $binary_remote_addr;
}

upstream open_design_daemon_hashed {
    hash $teamver_daemon_hash_key_resolved consistent;
    server 127.0.0.1:7456 max_fails=2 fail_timeout=10s;
    include /etc/nginx/conf.d/teamver-design-od-daemon-peers.inc.conf;
}

# Stateless static / health / unauthenticated asset — always local daemon.
upstream open_design_daemon_local {
    server 127.0.0.1:7456;
    keepalive 8;
}
