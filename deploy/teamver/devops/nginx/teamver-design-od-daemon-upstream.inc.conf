# OD daemon upstream — Phase 4 userId hash routing (docs-teamver/39_2 §4).
#
# ALB는 round-robin (stickiness OFF 권장). affinity는 nginx가 담당:
#   hash $teamver_daemon_hash_key → cluster private IP :7456 (NOT 127.0.0.1 —
#   loopback in hash ring breaks sticky when ALB lands on different nginx nodes).
#
# Hash key 우선순위 (Phase 4.1 — project-scoped affinity):
#   1) projectId in URI — /api/projects/:id/… (동일 deck → 동일 노드 scratch/SQLite)
#   2) $teamver_user_id — 목록·생성 등 projectId 없는 /api/*
#   3) $binary_remote_addr — public static asset 등
#
# Collection slugs (recent, cover-hints)는 userId hash 유지.
#
# Hash upstream backends (ALL cluster EC2 private IPs, sorted — identical on every node):
# /etc/nginx/teamver-design-od-daemon-peers.inc
# (render_od_daemon_peers_nginx.sh — must NOT live under conf.d/*.conf)

map $uri $teamver_daemon_hash_project_id {
    default "";
    ~^/api/projects/(recent|cover-hints)(/|$) "";
    ~^/api/projects/([^/]+)(/|$) $1;
}

map $teamver_daemon_hash_project_id $teamver_daemon_hash_key {
    default $teamver_daemon_hash_project_id;
    ""      $teamver_user_id;
}

map $teamver_daemon_hash_key $teamver_daemon_hash_key_resolved {
    default $teamver_daemon_hash_key;
    ""      $binary_remote_addr;
}

upstream open_design_daemon_hashed {
    hash $teamver_daemon_hash_key_resolved consistent;
    include /etc/nginx/teamver-design-od-daemon-peers.inc;
}

# Stateless static / health / unauthenticated asset — always local daemon.
upstream open_design_daemon_local {
    server 127.0.0.1:7456;
    keepalive 8;
}
