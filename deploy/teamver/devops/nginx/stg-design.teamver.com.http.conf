# =============================================================================
# Teamver Design — Staging HTTP (certbot 발급 단계)
# - stg-design.teamver.com      → OD :7456
# - stg-design-api.teamver.com  → teamver-design-api :16000
#
# 적용:
#   sudo bash devops/nginx/apply_teamver_design_staging_nginx_conf.sh \
#     ./stg-design.teamver.com.http.conf
# =============================================================================

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# Embed FE active workspace (X-Workspace-Id) overrides session-check default for daemon/BFF.
map $http_x_workspace_id $teamver_daemon_workspace_id {
    ""      $teamver_workspace_id;
    default $http_x_workspace_id;
}

include /etc/nginx/conf.d/teamver-design-od-token.conf;

upstream teamver_main_be_stg {
    server stg-api.teamver.com:443;
    keepalive 4;
}

include /etc/nginx/sites-available/teamver-design-od-daemon-upstream.inc.conf;

# default_server: ALB health check sends no Host (target private IP) — must not fall through to sites-enabled/default (404).
server {
    listen 80 default_server;
    server_name stg-design.teamver.com;

    absolute_redirect off;
    port_in_redirect off;

    client_max_body_size 200m;

    location = /_nginx/health {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }

    location ^~ /.well-known/acme-challenge/ {
        default_type "text/plain";
        root /var/www/certbot;
    }

    location = /_teamver_auth {
        internal;
        proxy_pass https://teamver_main_be_stg/api/auth/session-check;
        proxy_ssl_server_name on;
        proxy_set_header Host stg-api.teamver.com;
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";
        proxy_set_header Cookie $http_cookie;
        proxy_set_header Authorization $http_authorization;
        proxy_connect_timeout 3s;
        proxy_read_timeout 5s;
    }

    location @teamver_login {
        return 302 https://stg.teamver.com/auth/signin?returnTo=https%3A%2F%2F$host$uri;
    }

    include /etc/nginx/sites-available/teamver-design-od-bff.inc.conf;
    include /etc/nginx/sites-available/teamver-design-plugin-preview.inc.conf;
    include /etc/nginx/sites-available/teamver-design-od-public-static.inc.conf;
    include /etc/nginx/sites-available/teamver-design-od-preview-scope.inc.conf;

    location /api/ {
        auth_request /_teamver_bff_session;
        auth_request_set $teamver_user_id $upstream_http_x_teamver_user_id;
        auth_request_set $teamver_workspace_id $upstream_http_x_teamver_workspace_id;
        error_page 401 403 = @teamver_od_bff_unauthorized;

        proxy_pass http://open_design_daemon_hashed;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Teamver-User-Id $teamver_user_id;
        proxy_set_header X-Teamver-Workspace-Id $teamver_daemon_workspace_id;
        proxy_set_header X-Workspace-Id $teamver_daemon_workspace_id;
        proxy_set_header Authorization "Bearer $teamver_od_api_token";
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_cache off;
        gzip off;
        proxy_connect_timeout 10s;
        proxy_send_timeout 3600s;
        proxy_read_timeout 3600s;
    }

    location / {
        proxy_pass http://open_design_daemon_local;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_buffering off;
        proxy_connect_timeout 10s;
        proxy_send_timeout 900s;
        proxy_read_timeout 900s;
    }

    access_log /var/log/nginx/stg-design.teamver.access.log;
    error_log  /var/log/nginx/stg-design.teamver.error.log;
}

server {
    listen 80;
    server_name stg-design-api.teamver.com;

    absolute_redirect off;
    port_in_redirect off;

    client_max_body_size 200m;

    location = /_nginx/health {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }

    location ^~ /.well-known/acme-challenge/ {
        default_type "text/plain";
        root /var/www/certbot;
    }

    # M2M usage/billing ingest — daemon/localhost only; public internet blocked
    # (10 §3.3 / 09 §3 / 11 §B-1..B-3). Mirror of prod design-api.teamver.com.
    location /api/internal/ {
        allow 127.0.0.1;
        allow ::1;
        deny all;
        proxy_pass http://127.0.0.1:16000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
        proxy_set_header X-Forwarded-Host $host;
        proxy_buffering off;
    }

    location / {
        proxy_pass http://127.0.0.1:16000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
        proxy_buffering off;
        proxy_connect_timeout 10s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
    }

    access_log /var/log/nginx/stg-design-api.teamver.access.log;
    error_log  /var/log/nginx/stg-design-api.teamver.error.log;
}
