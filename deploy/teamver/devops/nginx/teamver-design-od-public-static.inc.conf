# Next.js static export (/_next/static/*) — no auth_request.
# Hashed JS/CSS/fonts are public; gating them returns 302 HTML → browser ChunkLoadError.
# OD daemon :7456 serves files; API/HTML routes stay session-gated in location / and /api/.
# SSOT: docs-teamver/31 §8.2

location ^~ /_next/ {
        proxy_pass http://open_design_daemon_local;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header Connection "";
    proxy_buffering off;
    add_header Cache-Control "public, max-age=31536000, immutable" always;
}

location = /favicon.ico {
        proxy_pass http://open_design_daemon_local;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
    proxy_set_header Connection "";
    add_header Cache-Control "public, max-age=86400" always;
}
