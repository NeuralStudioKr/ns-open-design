# BFF session probe for design-api nginx auth_request (Apps JWT — not Main cookie).
# Include inside stg-design-api / design-api server blocks before protected routes.

location = /_teamver_bff_session {
    internal;
    proxy_pass http://127.0.0.1:16000/api/v1/auth/session-probe;
    proxy_pass_request_body off;
    proxy_set_header Content-Length "";
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header Cookie $http_cookie;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;
}
