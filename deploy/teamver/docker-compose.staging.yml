# Staging override — teamver-design-api env_file (symlink .env 불필요).
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.staging.yml --env-file .env.staging ...

services:
  open-design-daemon:
    environment:
      OD_SCRATCH_EVICT_AFTER_RUN: "1"
      OD_SCRATCH_EVICT_IDLE: ${OD_SCRATCH_EVICT_IDLE:-1}
      OD_SCRATCH_EVICT_IDLE_AFTER_MS: ${OD_SCRATCH_EVICT_IDLE_AFTER_MS:-}
      OD_S3_SYNC_UP_METRICS: "1"
      OD_SCRATCH_DISK_METRICS: "1"
      OD_SCRATCH_DISK_THRESHOLD_MB: ${OD_SCRATCH_DISK_THRESHOLD_MB:-2048}
      OD_SCRATCH_DISK_METRIC_INTERVAL_MS: ${OD_SCRATCH_DISK_METRIC_INTERVAL_MS:-300000}
      HOME: /tmp
      XDG_CONFIG_HOME: /tmp/.chromium
      XDG_CACHE_HOME: /tmp/.chromium
      OD_EXPORT_CHROMIUM_PATH: /usr/bin/chromium
      PLAYWRIGHT_BROWSERS_PATH: /ms-playwright
      OD_CHROMIUM_SINGLE_PROCESS: "1"
      OD_EXPORT_MAX_CONCURRENT: ${OD_EXPORT_MAX_CONCURRENT:-4}
      OD_EXPORT_BROWSER_POOL_SIZE: ${OD_EXPORT_BROWSER_POOL_SIZE:-2}
      OD_EXPORT_QUEUE_MAX: ${OD_EXPORT_QUEUE_MAX:-32}
      OD_EXPORT_TICKET_TTL_SEC: ${OD_EXPORT_TICKET_TTL_SEC:-300}

  teamver-design-api:
    env_file:
      - .env.staging
    environment:
      TEAMVER_DEPLOY_ENV: staging
      AUTH_DISABLED: "false"
      ALLOW_NO_JWT_LOCAL_MODE: "false"
      OD_PROJECT_STORAGE: ${OD_PROJECT_STORAGE:?Set OD_PROJECT_STORAGE=s3 in .env.staging}
