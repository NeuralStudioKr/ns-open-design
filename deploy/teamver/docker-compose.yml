# Teamver sidecar: OD daemon + Teamver wrapper BE (design-api).
# See deploy/teamver/docs/TEAMVER_APPS_INTEGRATION.md

name: teamver-open-design

services:
  open-design-daemon:
    container_name: teamver-open-design-daemon
    image: ${OPEN_DESIGN_IMAGE:-docker.io/vanjayak/open-design:latest}
    build:
      context: ../..
      dockerfile: deploy/Dockerfile
      args:
        NODE_IMAGE: ${NODE_BASE_IMAGE:-public.ecr.aws/docker/library/node:24-bookworm-slim}
        RUNTIME_IMAGE: ${RUNTIME_BASE_IMAGE:-public.ecr.aws/docker/library/node:24-bookworm-slim}
        HTTP_PROXY: ${HTTP_PROXY:-}
        HTTPS_PROXY: ${HTTPS_PROXY:-}
        http_proxy: ${http_proxy:-}
        https_proxy: ${https_proxy:-}
        no_proxy: ${no_proxy:-}
        NO_PROXY: ${NO_PROXY:-}
        VITE_MESSAGE_PERSIST_THROTTLE_MS: ${VITE_MESSAGE_PERSIST_THROTTLE_MS:-5000}
        VITE_TEAMVER_MAIN_LOGIN_URL: ${VITE_TEAMVER_MAIN_LOGIN_URL:-https://stg.teamver.com/auth/signin}
        VITE_TEAMVER_SITE_URL: ${VITE_TEAMVER_SITE_URL:-https://design.teamver.com}
        # Cache-busts the Playwright chromium install RUN layer. deploy.sh
        # sets this to the current git SHA so every deploy rebuilds the
        # download step, preventing stale/broken /ms-playwright payloads
        # from surviving across deploys without --no-cache.
        PLAYWRIGHT_INSTALL_TOKEN: ${PLAYWRIGHT_INSTALL_TOKEN:-default}
    restart: unless-stopped
    environment:
      NODE_ENV: production
      NODE_OPTIONS: ${NODE_OPTIONS:---max-old-space-size=512}
      OD_BIND_HOST: 0.0.0.0
      OD_PORT: 7456
      OD_WEB_PORT: 7456
      OD_API_TOKEN: ${OD_API_TOKEN:?Set OD_API_TOKEN in .env (openssl rand -hex 32)}
      OD_DATA_DIR: /app/.od
      OD_ALLOWED_ORIGINS: ${OD_ALLOWED_ORIGINS:-}
      # docs-teamver/39_2 · 39_5 — multi-node identity for ALB stickiness
      # verification and failover triage (X-OD-Node-Id header + /api/health
      # nodeId field). Empty on single-node dev → header omitted, health
      # reports "unknown". deploy.sh auto-populates from EC2 IMDS.
      OD_NODE_ID: ${OD_NODE_ID:-}
      TEAMVER_DESIGN_API_URL: ${TEAMVER_DESIGN_API_URL:-http://teamver-design-api:8000}
      TEAMVER_INTERNAL_API_KEY: ${TEAMVER_INTERNAL_API_KEY:-}
      TEAMVER_PROJECT_ACCESS_TIMEOUT_MS: ${TEAMVER_PROJECT_ACCESS_TIMEOUT_MS:-2500}
      # daemon project-access cache TTL. 30s grant + 5s permanent deny + 1.5s
      # transient deny 가 상용 SSOT (teamver-project-access.ts). 미설정 시
      # code default 사용. 튜닝 이유는 docs-teamver/34 §운영 튜닝 참고.
      TEAMVER_PROJECT_ACCESS_GRANT_TTL_MS: ${TEAMVER_PROJECT_ACCESS_GRANT_TTL_MS:-}
      TEAMVER_PROJECT_ACCESS_DENY_PERMANENT_TTL_MS: ${TEAMVER_PROJECT_ACCESS_DENY_PERMANENT_TTL_MS:-}
      TEAMVER_PROJECT_ACCESS_DENY_TRANSIENT_TTL_MS: ${TEAMVER_PROJECT_ACCESS_DENY_TRANSIENT_TTL_MS:-}
      # Project storage (09 — default local; s3 + MaterializingProjectStorage when OD_PROJECT_STORAGE=s3)
      OD_PROJECT_STORAGE: ${OD_PROJECT_STORAGE:-local}
      OD_S3_BUCKET: ${OD_S3_BUCKET:-}
      OD_S3_REGION: ${OD_S3_REGION:-}
      OD_S3_PREFIX: ${OD_S3_PREFIX:-}
      OD_S3_ENDPOINT: ${OD_S3_ENDPOINT:-}
      OD_S3_ACCESS_KEY_ID: ${OD_S3_ACCESS_KEY_ID:-}
      OD_S3_SECRET_ACCESS_KEY: ${OD_S3_SECRET_ACCESS_KEY:-}
      OD_SCRATCH_DIR: ${OD_SCRATCH_DIR:-/app/.od/scratch}
      OD_PROJECT_LAZY_SYNC_TTL_MS: ${OD_PROJECT_LAZY_SYNC_TTL_MS:-}
      OD_S3_PURGE_ON_DELETE: ${OD_S3_PURGE_ON_DELETE:-}
      OD_SCRATCH_EVICT_AFTER_RUN: ${OD_SCRATCH_EVICT_AFTER_RUN:-}
      OD_SCRATCH_EVICT_IDLE: ${OD_SCRATCH_EVICT_IDLE:-}
      OD_SCRATCH_EVICT_IDLE_AFTER_MS: ${OD_SCRATCH_EVICT_IDLE_AFTER_MS:-}
      OD_S3_SYNC_UP_METRICS: ${OD_S3_SYNC_UP_METRICS:-}
      OD_SCRATCH_DISK_METRICS: ${OD_SCRATCH_DISK_METRICS:-}
      OD_SCRATCH_DISK_THRESHOLD_MB: ${OD_SCRATCH_DISK_THRESHOLD_MB:-}
      OD_SCRATCH_DISK_METRIC_INTERVAL_MS: ${OD_SCRATCH_DISK_METRIC_INTERVAL_MS:-}
      # Headless export (PDF/image) — Playwright-managed chromium.
      # crashpad needs writable XDG dirs in read-only containers (root
      # FS is ro; /tmp is tmpfs). `PLAYWRIGHT_BROWSERS_PATH` matches
      # deploy/Dockerfile so the daemon finds the bundled Chromium.
      # `OD_EXPORT_CHROMIUM_PATH` and `OD_CHROMIUM_SINGLE_PROCESS` are
      # NOT set: Playwright-managed chromium is preferred by the
      # launcher and `--single-process` caused SIGTRAPs on M120+.
      HOME: /tmp
      XDG_CONFIG_HOME: /tmp/.chromium
      XDG_CACHE_HOME: /tmp/.chromium
      PLAYWRIGHT_BROWSERS_PATH: /ms-playwright
      OD_EXPORT_MAX_CONCURRENT: ${OD_EXPORT_MAX_CONCURRENT:-4}
      OD_EXPORT_BROWSER_POOL_SIZE: ${OD_EXPORT_BROWSER_POOL_SIZE:-2}
      OD_EXPORT_QUEUE_MAX: ${OD_EXPORT_QUEUE_MAX:-32}
      OD_EXPORT_TICKET_TTL_SEC: ${OD_EXPORT_TICKET_TTL_SEC:-300}
      # Export artifact cache (Phase 1a — docs-teamver/34 §20). code default ON.
      # 0/false/off/no 로만 명시적 disable. memo (RAM LRU) + local (EBS
      # od-data/.od-export-cache) 2-tier. cache 키에 entryFile mtime 포함이라
      # 프로젝트 수정 시 자동 miss. staging/production 공통 ON.
      OD_EXPORT_CACHE_ENABLED: ${OD_EXPORT_CACHE_ENABLED:-1}
      OD_EXPORT_CACHE_VERSION: ${OD_EXPORT_CACHE_VERSION:-}
      OD_EXPORT_CACHE_MEMO_ENABLED: ${OD_EXPORT_CACHE_MEMO_ENABLED:-}
      OD_EXPORT_CACHE_MEMO_TTL_SEC: ${OD_EXPORT_CACHE_MEMO_TTL_SEC:-}
      OD_EXPORT_CACHE_MEMO_MAX_ENTRIES: ${OD_EXPORT_CACHE_MEMO_MAX_ENTRIES:-}
      OD_EXPORT_CACHE_MEMO_MAX_ENTRY_BYTES: ${OD_EXPORT_CACHE_MEMO_MAX_ENTRY_BYTES:-}
      OD_EXPORT_CACHE_MEMO_MAX_TOTAL_BYTES: ${OD_EXPORT_CACHE_MEMO_MAX_TOTAL_BYTES:-}
      OD_EXPORT_CACHE_LOCAL_ENABLED: ${OD_EXPORT_CACHE_LOCAL_ENABLED:-}
      OD_EXPORT_CACHE_LOCAL_MAX_TOTAL_BYTES: ${OD_EXPORT_CACHE_LOCAL_MAX_TOTAL_BYTES:-}
      OD_EXPORT_CACHE_LOCAL_MAX_AGE_SEC: ${OD_EXPORT_CACHE_LOCAL_MAX_AGE_SEC:-}
      OD_EXPORT_CACHE_LOCAL_SWEEP_INTERVAL_SEC: ${OD_EXPORT_CACHE_LOCAL_SWEEP_INTERVAL_SEC:-}
      OD_EXPORT_CACHE_DIR: ${OD_EXPORT_CACHE_DIR:-}
      # Export offload (Phase 2 — docs-teamver/34). When enabled, ticketed
      # downloads upload the rendered artifact to S3 and return a single-use
      # daemon ticket that redirects to a short-lived presigned GET URL. Keep
      # these explicitly wired here; values that only exist in .env are not
      # visible inside the daemon container unless compose passes them through.
      OD_EXPORT_OFFLOAD_ENABLED: ${OD_EXPORT_OFFLOAD_ENABLED:-0}
      OD_EXPORT_OFFLOAD_BUCKET: ${OD_EXPORT_OFFLOAD_BUCKET:-}
      OD_EXPORT_OFFLOAD_REGION: ${OD_EXPORT_OFFLOAD_REGION:-}
      OD_EXPORT_OFFLOAD_PREFIX: ${OD_EXPORT_OFFLOAD_PREFIX:-}
      OD_EXPORT_OFFLOAD_ENDPOINT: ${OD_EXPORT_OFFLOAD_ENDPOINT:-}
      OD_EXPORT_OFFLOAD_PRESIGN_TTL_SEC: ${OD_EXPORT_OFFLOAD_PRESIGN_TTL_SEC:-300}
      TEAMVER_BILLING_DISABLED: ${TEAMVER_BILLING_DISABLED:-}
      TEAMVER_BILLING_TIMEOUT_MS: ${TEAMVER_BILLING_TIMEOUT_MS:-}
      TEAMVER_BILLING_RESERVE_AMOUNT: ${TEAMVER_BILLING_RESERVE_AMOUNT:-}
      AWS_REGION: ${AWS_REGION:-}
      # LLM provider keys (optional — daemon env, never commit). API-mode chat
      # still reads browser BYOK; these power memory/media fallbacks.
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      TEAMVER_OD_API_KEY: ${TEAMVER_OD_API_KEY:-}
      # Track B5 — Postgres DaemonDb (multi-node chat SSOT). Default sqlite.
      OD_DAEMON_DB: ${OD_DAEMON_DB:-sqlite}
      OD_PG_HOST: ${OD_PG_HOST:-}
      OD_PG_PORT: ${OD_PG_PORT:-5432}
      OD_PG_DATABASE: ${OD_PG_DATABASE:-}
      OD_PG_USER: ${OD_PG_USER:-}
      OD_PG_PASSWORD: ${OD_PG_PASSWORD:-}
      OD_PG_SSL_MODE: ${OD_PG_SSL_MODE:-require}
      OD_PG_POOL_MAX: ${OD_PG_POOL_MAX:-10}
      # Embed slide MVP catalog trims (Teamver design.teamver.com — docs-teamver/13).
      OD_PLUGIN_CATALOG_DEFAULT_MODE: ${OD_PLUGIN_CATALOG_DEFAULT_MODE:-}
      OD_SKILLS_CATALOG_SLIDE_ONLY: ${OD_SKILLS_CATALOG_SLIDE_ONLY:-}
      OD_DESIGN_TEMPLATES_EXCLUDE_ZH_CN: ${OD_DESIGN_TEMPLATES_EXCLUDE_ZH_CN:-}
    ports:
      # 127.0.0.1 default (local dev). Multi-node: deploy.sh sets
      # OD_DOCKER_PUBLISH_HOST=0.0.0.0 so peer EC2 nginx can reach :7456
      # (app SG peer rule — docs-teamver/39_2 §4).
      - "${OD_DOCKER_PUBLISH_HOST:-127.0.0.1}:${OD_PORT:-7456}:7456"
    volumes:
      # Hosted EC2: bind OD_DATA_HOST_PATH (/opt/teamver-design/od-data) — NOT Docker named volume on root.
      - ${OD_DATA_HOST_PATH:-./.od-data-local}:/app/.od
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    # BYOK streaming + headless export (Chromium ×BROWSER_POOL_SIZE) share
    # this container, so the 512m compose fallback was too tight for even
    # a single deck export (Chromium alone routinely peaks over 300MB per
    # instance). Raise the fallback to 1g so a local dev without env files
    # does not OOM immediately; staging / production override via
    # `OD_MEM_LIMIT` in `.env.staging` / `.env.production` (1536m / 4g).
    mem_limit: ${OD_MEM_LIMIT:-1g}
    pids_limit: 256
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:7456/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  # Litestream sidecar — deploy.sh always targets this service on hosted environments.
  litestream:
    profiles:
      - litestream
    image: litestream/litestream:0.3.13
    container_name: teamver-design-litestream
    restart: unless-stopped
    mem_limit: 256m
    cpus: 0.5
    command: ["replicate", "-config", "/etc/litestream.yml"]
    environment:
      OD_DATA_DIR: /data
      LITESTREAM_BUCKET: ${LITESTREAM_BUCKET:?Set LITESTREAM_BUCKET (terraform output project_data_bucket)}
      LITESTREAM_REGION: ${LITESTREAM_REGION:-ap-northeast-2}
      LITESTREAM_SYNC_INTERVAL: ${LITESTREAM_SYNC_INTERVAL:-3s}
      # docs-teamver/39_3 §5.2 — per-node replica path when running
      # multiple daemons. deploy.sh overrides from OD_NODE_ID; litestream.yml
      # uses plain ${LITESTREAM_REPLICA_PATH} (Go ExpandEnv — no :- defaults).
      LITESTREAM_REPLICA_PATH: ${LITESTREAM_REPLICA_PATH:-litestream/app.sqlite}
      AWS_REGION: ${AWS_REGION:-ap-northeast-2}
      # Staging: OD_S3_* static key 가 있으면 Litestream도 사용 (instance profile IAM 패치 전 임시).
      # Production: 비워 두면 instance profile(IMDS)만 사용.
      AWS_ACCESS_KEY_ID: ${OD_S3_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${OD_S3_SECRET_ACCESS_KEY:-}
    volumes:
      # RW required — Litestream creates _litestream_seq in app.sqlite (readonly → sync error).
      - ${OD_DATA_HOST_PATH:-./.od-data-local}:/data
      - ./litestream.yml:/etc/litestream.yml:ro

  design-db:
    image: postgres:16-alpine
    container_name: teamver-design-db
    profiles:
      - local-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-teamver_design}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWD:-postgres}
    volumes:
      - design_pg_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:54320:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  teamver-design-api:
    build:
      context: ../../..
      dockerfile: ns-open-design/deploy/teamver/be/Dockerfile
      args:
        PYTHON_IMAGE: ${PYTHON_BASE_IMAGE:-public.ecr.aws/docker/library/python:3.12-slim}
        HTTP_PROXY: ${HTTP_PROXY:-}
        HTTPS_PROXY: ${HTTPS_PROXY:-}
        http_proxy: ${http_proxy:-}
        https_proxy: ${https_proxy:-}
        no_proxy: ${no_proxy:-}
        NO_PROXY: ${NO_PROXY:-}
    container_name: teamver-design-api
    restart: unless-stopped
    # env_file: staging/production override compose 에서 .env.staging|.env.production 직접 지정.
    # CLI: docker compose -f docker-compose.yml -f docker-compose.staging.yml --env-file .env.staging
    environment:
      # uvicorn 튜닝 — Dockerfile default 3/200/30, .env 로 재빌드 없이 override.
      # 상용 SSOT: production=5 (t3.2xlarge 8vCPU) / staging=2 (t3.large 2vCPU).
      UVICORN_WORKERS: ${UVICORN_WORKERS:-3}
      UVICORN_LIMIT_CONCURRENCY: ${UVICORN_LIMIT_CONCURRENCY:-200}
      UVICORN_TIMEOUT_KEEP_ALIVE: ${UVICORN_TIMEOUT_KEEP_ALIVE:-30}
      # SQLAlchemy async pool 튜닝 — 코드 default 10/10/1800/30. RDS
      # max_connections 잔여치 변경 시 재빌드 없이 조정 (connection.py).
      DB_POOL_SIZE: ${DB_POOL_SIZE:-}
      DB_POOL_MAX_OVERFLOW: ${DB_POOL_MAX_OVERFLOW:-}
      DB_POOL_RECYCLE_SEC: ${DB_POOL_RECYCLE_SEC:-}
      DB_POOL_TIMEOUT_SEC: ${DB_POOL_TIMEOUT_SEC:-}
      # Slow-request 관측 — 코드 default 1000ms. CloudWatch metric filter
      # 는 warn 라인의 duration_ms 필드로 p95 산정. 트래픽 급증 시 노이즈
      # 컷하고 싶으면 이 값을 올린다.
      SLOW_REQUEST_THRESHOLD_MS: ${SLOW_REQUEST_THRESHOLD_MS:-}
      SLOW_REQUEST_HEADER_ENABLED: ${SLOW_REQUEST_HEADER_ENABLED:-}
      POSTGRES_HOST: ${POSTGRES_HOST:-design-db}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_DB: ${POSTGRES_DB:-teamver_design}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWD: ${POSTGRES_PASSWD:-postgres}
      POSTGRES_SSLMODE: ${POSTGRES_SSLMODE:-disable}
      OD_DAEMON_BASE_URL: ${OD_DAEMON_BASE_URL:-http://open-design-daemon:7456}
      OD_API_TOKEN: ${OD_API_TOKEN:-}
      OD_PROJECT_STORAGE: ${OD_PROJECT_STORAGE:-local}
      TRUST_TEAMVER_PROXY_HEADERS: ${TRUST_TEAMVER_PROXY_HEADERS:-false}
      TEAMVER_INTERNAL_API_KEY: ${TEAMVER_INTERNAL_API_KEY:-}
      TEAMVER_DESIGN_API_URL: ${TEAMVER_DESIGN_API_URL:-http://teamver-design-api:8000}
      # Registry billing + Strategy A reserve estimate (infra wiring — actual charge CTO hold)
      TEAMVER_REGISTRY_APP_ID: ${TEAMVER_REGISTRY_APP_ID:-}
      TEAMVER_REGISTRY_KEY_ID: ${TEAMVER_REGISTRY_KEY_ID:-}
      TEAMVER_REGISTRY_ACCESS_KEY: ${TEAMVER_REGISTRY_ACCESS_KEY:-}
      TEAMVER_BILLING_DISABLED: ${TEAMVER_BILLING_DISABLED:-}
      TEAMVER_BILLING_RESERVE_AMOUNT: ${TEAMVER_BILLING_RESERVE_AMOUNT:-}
      DESIGN_BILLING_MAX_RESERVE_T: ${DESIGN_BILLING_MAX_RESERVE_T:-}
      DESIGN_BILLING_RESERVE_INPUT_TOKENS: ${DESIGN_BILLING_RESERVE_INPUT_TOKENS:-}
      DESIGN_BILLING_RESERVE_OUTPUT_TOKENS: ${DESIGN_BILLING_RESERVE_OUTPUT_TOKENS:-}
      DESIGN_MODEL_PRICES_JSON: ${DESIGN_MODEL_PRICES_JSON:-}
      # docs-teamver/39_2 · 39_5 — multi-node identity (X-Design-Api-Node
      # header + /healthz node_id field). Mirrors daemon OD_NODE_ID so
      # both surfaces share the same EC2 instance id. deploy.sh injects
      # from EC2 IMDS at compose-up time; local dev leaves it empty.
      TEAMVER_DESIGN_NODE_ID: ${OD_NODE_ID:-}
    ports:
      - "127.0.0.1:${BE_PORT:-16000}:8000"
    depends_on:
      design-db:
        condition: service_healthy
        required: false
    # Multi-worker uvicorn 에서 워커 하나가 event-loop hang 이면 docker
    # restart 로 회복 가능해야 한다. wget/curl 은 python:slim 에 기본
    # 없음 → Python one-liner (표준 라이브러리 urllib) 사용.
    #
    # /api/healthz 는 lifespan 스키마 체크까지 도는데, 정상 시엔 200
    # payload {"status":"ok"} 를 리턴한다. urlopen 은 4xx/5xx 응답에서
    # HTTPError 를, 연결 자체 실패엔 URLError 를 raise 하므로 python
    # 프로세스는 자동으로 non-zero exit → docker 가 unhealthy 로 분류.
    # ``sys.exit(0 if r.status < 500 else 1)`` 은 방어적으로만 남긴 것이며
    # 실제로는 예외 경로에서 이미 걸러진다.
    #
    # 3s timeout — 3워커 uvicorn 이 정상이면 healthz p99 < 200ms. 3s 여유
    # 는 lifespan warmup 이 늦게 끝나는 재기동 직후를 커버.
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request,sys; r=urllib.request.urlopen('http://127.0.0.1:8000/api/healthz',timeout=3); sys.exit(0 if r.status < 500 else 1)"
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  # Local S3-compat dev (P1-9) — docker compose --profile minio up -d
  minio:
    profiles:
      - minio
    image: minio/minio:RELEASE.2024-12-18T13-15-44Z
    container_name: teamver-design-minio
    restart: unless-stopped
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: ${OD_S3_ACCESS_KEY_ID:-minioadmin}
      MINIO_ROOT_PASSWORD: ${OD_S3_SECRET_ACCESS_KEY:-minioadmin}
    ports:
      - "127.0.0.1:19000:9000"
      - "127.0.0.1:19001:9001"
    volumes:
      - teamver_minio_data:/data

  minio-init:
    profiles:
      - minio
    image: minio/mc:RELEASE.2024-11-17T19-35-32Z
    container_name: teamver-design-minio-init
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 $${MINIO_ROOT_USER} $${MINIO_ROOT_PASSWORD}; do sleep 1; done;
      mc mb --ignore-existing local/$${MINIO_BUCKET};
      exit 0;
      "
    environment:
      MINIO_ROOT_USER: ${OD_S3_ACCESS_KEY_ID:-minioadmin}
      MINIO_ROOT_PASSWORD: ${OD_S3_SECRET_ACCESS_KEY:-minioadmin}
      MINIO_BUCKET: ${OD_S3_BUCKET:-teamver-design-local}

volumes:
  teamver_minio_data:
  design_pg_data:
