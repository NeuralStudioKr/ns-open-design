name: open-design

services:
  open-design:
    container_name: open-design
    image: ${OPEN_DESIGN_IMAGE:-docker.io/vanjayak/open-design:latest}
    build:
      context: ..
      dockerfile: deploy/Dockerfile
      args:
        # Cache-busts the Playwright chromium install RUN layer. Set to
        # the current git SHA at deploy time so /ms-playwright is always
        # rebuilt fresh; see deploy/Dockerfile PLAYWRIGHT_INSTALL_TOKEN.
        PLAYWRIGHT_INSTALL_TOKEN: ${PLAYWRIGHT_INSTALL_TOKEN:-default}
    restart: always
    environment:
      NODE_ENV: production
      NODE_OPTIONS: ${NODE_OPTIONS:---max-old-space-size=192}
      OD_BIND_HOST: 0.0.0.0
      OD_ALLOWED_ORIGINS: ${OPEN_DESIGN_ALLOWED_ORIGINS:-}
      OD_PORT: 7456
      OD_WEB_PORT: ${OPEN_DESIGN_PORT:-7456}
      OD_API_TOKEN: ${OD_API_TOKEN:?Please run 'openssl rand -hex 32' to generate one, and set it in your .env file.}
      OD_CODEX_SANDBOX: ${OD_CODEX_SANDBOX:-}
      # Headless export (PDF/image) — Playwright-managed chromium runs
      # under crashpad, which requires writable XDG dirs in read-only
      # containers (root FS is ro; /tmp is tmpfs).
      # PLAYWRIGHT_BROWSERS_PATH matches deploy/Dockerfile so the daemon
      # picks the bundled build ahead of any distro fallback.
      HOME: /tmp
      XDG_CONFIG_HOME: /tmp/.chromium
      XDG_CACHE_HOME: /tmp/.chromium
      PLAYWRIGHT_BROWSERS_PATH: /ms-playwright
    ports:
      - "127.0.0.1:${OPEN_DESIGN_PORT:-7456}:7456"
    volumes:
      - open_design_data:/app/.od
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    # Chromium pool (default 3 workers) plus the Node daemon does not fit
    # in 384 MiB. Bookworm chromium alone tops ~250 MiB RSS at startup so
    # anything under ~1 GiB routinely OOM-kills the pool during exports.
    mem_limit: ${OPEN_DESIGN_MEM_LIMIT:-1g}
    pids_limit: 256
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:7456/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

volumes:
  open_design_data:
